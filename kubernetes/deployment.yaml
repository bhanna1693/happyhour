apiVersion: apps/v1
kind: Deployment
metadata:
  name: happyhour-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: happyhour-app
  template:
    metadata:
      labels:
        app: happyhour-app
    spec:
      containers:
        - name: your-app-container
          image: bhanna1693/happyhour:latest  # Replace with your Docker image
          ports:
            - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: happyhour-app-service
spec:
  selector:
    app: happyhour-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
